# Copy to .dispatch-factory.toml and customize
# All paths/ports are local-only by default

[dispatch]
# Where dispatch writes its artifacts (session logs, JSON, etc.)
artifacts_dir = "~/.local/share/dispatch"

# Path to dispatch CLI
dispatch_bin = "~/.local/bin/dispatch"

[server]
# Bind to localhost only. Set to 0.0.0.0 ONLY if behind auth.
host = "127.0.0.1"
port = 8420

# Local URL via Traefik (*.localhost convention)
# Requires Traefik running with dynamic.yaml route: factory.localhost -> host.docker.internal:5173
# Access at: http://factory.localhost
local_url = "http://factory.localhost"

# Enable human controls (hold/kill/redispatch). Default: read-only.
enable_controls = false

[terminal]
# Enable ttyd terminal embedding. Requires ttyd installed.
enabled = false

# Read-only by default. Set to true to allow typing into worker sessions.
# WARNING: This lets the browser send keystrokes to running workers.
allow_input = false

# Port range for ttyd instances (one per active worker)
port_start = 7681
port_end = 7699

[heartbeat]
# Enable periodic heartbeat (reconcile backlog, detect stuck workers)
enabled = false

# Interval in minutes between heartbeat ticks
interval_minutes = 30

# Auto-dispatch pending backlog tickets when workers have capacity
auto_dispatch = false

# Maximum concurrent workers for auto-dispatch
max_concurrent = 3

# Maximum verification depth — how many verify/escalation tickets can chain
# for the same project before the heartbeat stops spawning new workers and
# writes a summary result instead.  Prevents runaway verification chains
# (e.g. 4-deep chain consuming 5 workers for one question).
max_verification_depth = 2

# Auto-create verification tickets for deploy/fix tasks.
# Disabled by default — verify task_type cannot dispatch (binary bug).
auto_verify = false
